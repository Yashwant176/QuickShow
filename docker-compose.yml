version: "3.9"

services:

  backend:
    build: ./server
    container_name: quickshow_backend
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build: ./client
    container_name: quickshow_frontend
    ports:
      - "5173:80"
    env_file:
      - ./client/.env
    depends_on:
      - backend
    restart: always